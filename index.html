<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasapalabra Fútbol - Fonética Española</title>
    <style>
        :root {
            --azul-pasapalabra: #0056b3;
            --verde-acierto: #28a745;
            --rojo-fallo: #dc3545;
            --naranja-espera: #ffc107;
            --morado-escucha: #9b59b6;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #1a1a2e;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container { position: relative; width: 600px; height: 600px; display: flex; align-items: center; justify-content: center; }
        .rosco { position: relative; width: 500px; height: 500px; border-radius: 50%; list-style: none; padding: 0; }
        .letra { position: absolute; width: 38px; height: 38px; background: var(--azul-pasapalabra); border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.1rem; transform: translate(-50%, -50%); transition: all 0.3s; }
        .acertada { background: var(--verde-acierto); }
        .fallada { background: var(--rojo-fallo); }
        .activa { transform: translate(-50%, -50%) scale(1.3); border-color: var(--naranja-espera); box-shadow: 0 0 15px var(--naranja-espera); z-index: 10; }

        #central-panel { position: absolute; text-align: center; width: 340px; z-index: 5; transition: 0.3s; padding: 20px; border-radius: 20px; }
        .modo-escucha { background: rgba(155, 89, 182, 0.2); border: 2px solid var(--morado-escucha); }
        
        #timer { font-size: 3.5rem; font-weight: bold; margin-bottom: 5px; }
        #pregunta-box { min-height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #status-voz { font-size: 1.2rem; font-weight: bold; color: var(--morado-escucha); text-transform: uppercase; height: 1.5em; margin-top: 10px; }
        #input-area { margin-top: 15px; display: flex; gap: 10px; flex-direction: column; }
        input[type="text"] { padding: 12px; font-size: 1.1rem; border-radius: 8px; border: none; text-align: center; width: 80%; margin: 0 auto; }
        .buttons { display: flex; gap: 5px; justify-content: center; margin-top: 10px; }
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; }
        #btn-start { background: white; color: #1a1a2e; font-size: 1.5rem; padding: 15px 40px; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <h1>PASAPALABRA FÚTBOL</h1>

    <div id="game-container">
        <ul class="rosco" id="rosco-letras"></ul>
        <div id="central-panel">
            <div id="timer">120</div>
            <div id="pregunta-box">
                <span id="texto-pregunta">Cargando voces españolas...</span>
                <div id="status-voz"></div>
            </div>
            <div id="input-area" class="hidden">
                <input type="text" id="user-answer" placeholder="..." autocomplete="off">
                <div class="buttons">
                    <button id="btn-micro" style="background:var(--morado-escucha); color:white;">🎤</button>
                    <button id="btn-enviar" style="background:var(--verde-acierto); color:white;">OK</button>
                    <button id="btn-pasapalabra" style="background:var(--naranja-espera);">PASAPALABRA</button>
                </div>
            </div>
            <button id="btn-start">EMPEZAR PARTIDO</button>
        </div>
    </div>

    <script>
        const FONETICA_LETRAS = {'I': 'con la i latina', 'V': 'con la uve', 'X': 'contiene la equis', 'Y': 'con la i griega'};
        
        const banco = {
            'A': [{r:['Alisson', 'Alison'], p:'Portero brasileño del Liverpool.'}],
            'B': [{r:['Benzema'], p:'Ex delantero del Madrid y Balón de Oro.'}],
            'C': [{r:['Courtois'], p:'Portero belga del Real Madrid.'}],
            'D': [{r:['Drogba'], p:'Leyenda de Costa de Marfil.'}],
            'E': [{r:['Etoo'], p:'Delantero camerunés del Barça e Inter.'}],
            'F': [{r:['Foden'], p:'Estrella inglesa del Manchester City.'}],
            'G': [{r:['Gavi', 'Gabi'], p:'Joven centrocampista del Barça.'}],
            'H': [{r:['Haaland'], p:'El androide noruego del gol.'}],
            'I': [{r:['Iniesta'], p:'El autor del gol en Johannesburgo.'}],
            'J': [{r:['Jorginho'], p:'Centrocampista italiano campeón de Europa.'}],
            'K': [{r:['Kane'], p:'Capitán y máximo goleador de Inglaterra.'}],
            'L': [{r:['Lewandowski'], p:'Delantero polaco del Barcelona.'}],
            'M': [{r:['Messi'], p:'El astro argentino campeón del mundo.'}],
            'N': [{r:['Neymar'], p:'Estrella brasileña que pasó por el PSG.'}],
            'O': [{r:['Oblak'], p:'Portero esloveno del Atlético.'}],
            'P': [{r:['Puyol'], p:'Eterno capitán del F.C. Barcelona.'}],
            'Q': [{r:['Quaresma', 'Cuaresma'], p:'Portugués famoso por su trivela.'}],
            'R': [{r:['Ronaldo'], p:'Cristiano o el Fenómeno.'}],
            'S': [{r:['Suarez'], p:'El pistolero uruguayo.'}],
            'T': [{r:['Ter Stegen'], p:'Portero alemán del Barcelona.'}],
            'U': [{r:['Unai Simon'], p:'Portero titular de España.'}],
            'V': [{r:['Vinicius'], p:'Extremo brasileño del Real Madrid.'}],
            'X': [{r:['Xavi'], p:'Contiene la equis: Director del mejor Barça.'}],
            'Y': [{r:['Yashin'], p:'La araña negra soviética.'}],
            'Z': [{r:['Zidane'], p:'Mago francés de la volea.'}]
        };

        let preguntas = [], currentIndex = 0, tiempo = 120, timer, activo = false, hablando = false, escuchaActivada = false;
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-ES';

        // Selección de voz española
        let vozEspanola = null;
        function cargarVoces() {
            const voces = window.speechSynthesis.getVoices();
            vozEspanola = voces.find(v => v.lang === 'es-ES' || v.lang === 'es_ES') || voces.find(v => v.lang.startsWith('es'));
        }
        window.speechSynthesis.onvoiceschanged = cargarVoces;
        cargarVoces();

        function súperNormalizar(str) {
            return str.toLowerCase()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/([^a-z0-9])/g, "")
                .replace(/v/g, 'b') // Tratar B y V como iguales fonéticamente
                .replace(/(.)\1+/g, '$1');
        }

        recognition.onstart = () => {
            if (hablando) { recognition.stop(); return; }
            escuchaActivada = true;
            document.getElementById('central-panel').classList.add('modo-escucha');
            document.getElementById('status-voz').innerHTML = '<span class="blink">● HABLA AHORA ●</span>';
        };

        recognition.onresult = (e) => {
            if (!escuchaActivada) return;
            const res = e.results[0][0].transcript;
            document.getElementById('user-answer').value = res;
            document.getElementById('status-voz').innerText = `Oído: ${res}`;
            escuchaActivada = false;
            setTimeout(verificar, 400);
        };

        recognition.onend = () => {
            document.getElementById('central-panel').classList.remove('modo-escucha');
            if (activo && !hablando && !escuchaActivada) {
                setTimeout(() => { if(activo && !hablando) try { recognition.start(); } catch(e){} }, 800);
            }
        };

        function hablar(texto, letra) {
            hablando = true; escuchaActivada = false; recognition.stop();
            const frase = `${FONETICA_LETRAS[letra] || 'con la ' + letra}: ${texto}`;
            const utterance = new SpeechSynthesisUtterance(frase);
            if (vozEspanola) utterance.voice = vozEspanola;
            utterance.lang = 'es-ES';
            
            utterance.onend = () => {
                setTimeout(() => {
                    hablando = false;
                    document.getElementById('texto-pregunta').innerText = `${letra}: ${texto}`;
                    if(activo) try { recognition.start(); } catch(e){}
                }, 800);
            };
            window.speechSynthesis.speak(utterance);
        }

        function verificar() {
            hablando = true;
            const resUser = súperNormalizar(document.getElementById('user-answer').value);
            const actual = preguntas[currentIndex];
            const letraNorm = actual.letra.toLowerCase();

            if (resUser.includes("pasapalabra")) {
                document.getElementById('user-answer').value = ""; pasapalabra(); return;
            }

            const esValido = actual.r.some(nombrePosible => {
                const nombreNorm = súperNormalizar(nombrePosible);
                const empiezaBien = (letraNorm === 'q') ? (resUser.startsWith('q') || resUser.startsWith('c')) : 
                                   (letraNorm === 'x') ? resUser.includes('x') : 
                                   (resUser.startsWith(letraNorm) || (letraNorm === 'b' && resUser.startsWith('v')) || (letraNorm === 'v' && resUser.startsWith('b')));

                return empiezaBien && (resUser.includes(nombreNorm) || nombreNorm.includes(resUser));
            });

            if (esValido) {
                actual.estado = 'acierto';
                document.getElementById(`letra-${currentIndex}`).classList.add('acertada');
                document.getElementById('user-answer').value = ""; hablando = false; siguiente();
            } else {
                actual.estado = 'fallo';
                document.getElementById(`letra-${currentIndex}`).classList.add('fallada');
                // Fonética forzada para el feedback de error (evitar "Gueibi")
                let respuestaParaLeer = actual.r[0];
                if (respuestaParaLeer.toLowerCase() === 'gavi' || respuestaParaLeer.toLowerCase() === 'gabi') respuestaParaLeer = "Gabi con b de Barcelona";
                
                const fb = new SpeechSynthesisUtterance(`Error, la respuesta era ${respuestaParaLeer}`);
                if (vozEspanola) fb.voice = vozEspanola;
                fb.lang = 'es-ES';
                fb.onend = () => { document.getElementById('user-answer').value = ""; hablando = false; siguiente(); };
                window.speechSynthesis.speak(fb);
            }
        }

        function siguiente() {
            let vueltas = 0;
            while (preguntas[currentIndex].estado && vueltas < 25) {
                currentIndex = (currentIndex + 1) % 25;
                vueltas++;
            }
            if (vueltas === 25) { finalizar(); return; }
            document.querySelectorAll('.letra').forEach(l => l.classList.remove('activa'));
            document.getElementById(`letra-${currentIndex}`).classList.add('activa');
            hablar(preguntas[currentIndex].p, preguntas[currentIndex].letra);
        }

        function pasapalabra() {
            hablando = true;
            const v = new SpeechSynthesisUtterance("Pasamos palabra");
            if (vozEspanola) v.voice = vozEspanola;
            v.lang = 'es-ES';
            v.onend = () => { currentIndex = (currentIndex + 1) % 25; hablando = false; siguiente(); };
            window.speechSynthesis.speak(v);
        }

        function finalizar() {
            activo = false; clearInterval(timer); recognition.stop();
            const ok = preguntas.filter(p => p.estado === 'acierto').length;
            document.getElementById('texto-pregunta').innerText = `FIN DEL JUEGO. Aciertos: ${ok}`;
            document.getElementById('input-area').classList.add('hidden');
            document.getElementById('btn-start').classList.remove('hidden');
        }

        document.getElementById('btn-start').addEventListener('click', () => {
            preguntas = Object.keys(banco).sort().map(l => ({letra: l, ...banco[l][0], estado: null}));
            const rosco = document.getElementById('rosco-letras'); rosco.innerHTML = "";
            preguntas.forEach((p, i) => {
                const li = document.createElement('li'); li.className = 'letra'; li.innerText = p.letra; li.id = `letra-${i}`;
                const angle = (i * (360 / 25)) - 90;
                li.style.left = `${250 + 220 * Math.cos(angle * Math.PI / 180)}px`;
                li.style.top = `${250 + 220 * Math.sin(angle * Math.PI / 180)}px`;
                rosco.appendChild(li);
            });
            document.getElementById('btn-start').classList.add('hidden');
            document.getElementById('input-area').classList.remove('hidden');
            activo = true; tiempo = 120; currentIndex = 0;
            timer = setInterval(() => { if(!hablando) { tiempo--; document.getElementById('timer').innerText = tiempo; if(tiempo<=0) finalizar(); }}, 1000);
            siguiente();
        });

        document.getElementById('btn-enviar').addEventListener('click', verificar);
        document.getElementById('btn-pasapalabra').addEventListener('click', pasapalabra);
        document.getElementById('btn-micro').addEventListener('click', () => { if(!hablando) try { recognition.start(); } catch(e){} });
    </script>
</body>
</html>
