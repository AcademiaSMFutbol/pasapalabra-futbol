<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasapalabra Fútbol - Sincronización Total</title>
    <style>
        :root {
            --azul-pasapalabra: #0056b3;
            --verde-acierto: #28a745;
            --rojo-fallo: #dc3545;
            --naranja-espera: #ffc107;
            --morado-escucha: #9b59b6;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #1a1a2e;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container { position: relative; width: 600px; height: 600px; display: flex; align-items: center; justify-content: center; }
        .rosco { position: relative; width: 500px; height: 500px; border-radius: 50%; list-style: none; padding: 0; }
        .letra { position: absolute; width: 38px; height: 38px; background: var(--azul-pasapalabra); border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.1rem; transform: translate(-50%, -50%); transition: all 0.3s; }
        .acertada { background: var(--verde-acierto); }
        .fallada { background: var(--rojo-fallo); }
        .activa { transform: translate(-50%, -50%) scale(1.3); border-color: var(--naranja-espera); box-shadow: 0 0 15px var(--naranja-espera); z-index: 10; }

        #central-panel { position: absolute; text-align: center; width: 340px; z-index: 5; transition: 0.3s; padding: 20px; border-radius: 20px; }
        .modo-escucha { background: rgba(155, 89, 182, 0.2); border: 2px solid var(--morado-escucha); }
        
        #timer { font-size: 3.5rem; font-weight: bold; margin-bottom: 5px; }
        
        #pregunta-box {
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #status-voz {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--morado-escucha);
            text-transform: uppercase;
            height: 1.5em;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        #input-area { margin-top: 15px; display: flex; gap: 10px; flex-direction: column; }
        input[type="text"] { padding: 12px; font-size: 1.1rem; border-radius: 8px; border: none; text-align: center; background: white; color: black; }
        
        .buttons { display: flex; gap: 5px; justify-content: center; margin-top: 10px; }
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; text-transform: uppercase; }
        
        #btn-micro { background: var(--morado-escucha); color: white; }
        #btn-enviar { background: var(--verde-acierto); color: white; }
        #btn-pasapalabra { background: var(--naranja-espera); color: black; }
        #btn-start { background: white; color: #1a1a2e; font-size: 1.5rem; padding: 15px 40px; }

        .hidden { display: none !important; }
        
        /* Animación para el mensaje de habla ahora */
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <h1>PASAPALABRA FÚTBOL</h1>

    <div id="game-container">
        <ul class="rosco" id="rosco-letras"></ul>
        <div id="central-panel">
            <div id="timer">120</div>
            <div id="pregunta-box">
                <span id="texto-pregunta">Pulsa para empezar</span>
                <div id="status-voz"></div>
            </div>
            <div id="input-area" class="hidden">
                <input type="text" id="user-answer" placeholder="..." autocomplete="off">
                <div class="buttons">
                    <button id="btn-micro">🎤 REINTENTAR</button>
                    <button id="btn-enviar">OK</button>
                    <button id="btn-pasapalabra">PASAPALABRA</button>
                </div>
            </div>
            <button id="btn-start">EMPEZAR PARTIDO</button>
        </div>
    </div>

    <script>
        const FONETICA = {'I': 'con la i latina', 'V': 'con la uve', 'X': 'contiene la equis', 'Y': 'con la i griega'};
        const banco = {
            'A': [{r:'Alisson', p:'Portero brasileño del Liverpool.'}],
            'B': [{r:'Benzema', p:'Ganador del Balón de Oro 2022 y ex del Real Madrid.'}],
            'C': [{r:'Courtois', p:'Portero belga clave en la decimocuarta del Madrid.'}],
            'D': [{r:'Drogba', p:'Leyenda goleadora de Costa de Marfil.'}],
            'E': [{r:'Etoo', p:'Delantero camerunés que ganó tripletes con Barça e Inter.'}],
            'F': [{r:'Foden', p:'Joven estrella inglesa del Manchester City.'}],
            'G': [{r:'Gavi', p:'Centrocampista del Barça, ganador del Golden Boy.'}],
            'H': [{r:'Haaland', p:'El delantero noruego apodado el androide.'}],
            'I': [{r:'Iniesta', p:'Autor del gol más importante de España.'}],
            'J': [{r:'Jorginho', p:'Centrocampista italiano clave en la Eurocopa de 2021.'}],
            'K': [{r:'Kane', p:'Máximo goleador histórico de la selección inglesa.'}],
            'L': [{r:'Lewandowski', p:'Goleador polaco del Barcelona.'}],
            'M': [{r:'Messi', p:'Capitán argentino campeón del mundo en Qatar.'}],
            'N': [{r:'Neymar', p:'Extremo brasileño famoso por su regate y jogo bonito.'}],
            'O': [{r:'Oblak', p:'Muro esloveno de la portería del Atlético.'}],
            'P': [{r:'Puyol', p:'El eterno capitán tiburón del Barça.'}],
            'Q': [{r:'Quaresma', p:'Portugués famoso por sus centros de trivela.'}],
            'R': [{r:'Ronaldo', p:'El fenómeno brasileño o Cristiano el bicho.'}],
            'S': [{r:'Suarez', p:'El pistolero uruguayo que brilló en el Barça.'}],
            'T': [{r:'Ter Stegen', p:'Portero alemán con gran juego de pies del Barça.'}],
            'U': [{r:'Unai Simon', p:'Portero titular de España y del Athletic.'}],
            'V': [{r:'Vinicius', p:'Extremo brasileño estrella del Real Madrid.'}],
            'X': [{r:'Xavi', p:'Contiene la equis: Maestro del centro del campo culé.'}],
            'Y': [{r:'Yashin', p:'La araña negra y único portero Balón de Oro.'}],
            'Z': [{r:'Zidane', p:'Zizou, autor de la volea en Glasgow.'}]
        };

        let preguntas = [], currentIndex = 0, tiempo = 120, timer, activo = false, hablando = false, escuchaActivada = false;
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-ES';
        recognition.interimResults = false;

        const panelUI = document.getElementById('central-panel');
        const statusUI = document.getElementById('status-voz');
        const inputUI = document.getElementById('user-answer');
        const preguntaUI = document.getElementById('texto-pregunta');

        function normalizar(str) {
            return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, "");
        }

        recognition.onstart = () => {
            if (hablando) { recognition.stop(); return; }
            escuchaActivada = true;
            panelUI.classList.add('modo-escucha');
            statusUI.innerHTML = '<span class="blink">● HABLA AHORA ●</span>';
        };

        recognition.onresult = (e) => {
            if (!escuchaActivada || hablando) return;
            const res = e.results[0][0].transcript;
            inputUI.value = res;
            statusUI.innerText = `Oído: ${res}`;
            escuchaActivada = false;
            setTimeout(verificar, 400);
        };

        recognition.onend = () => {
            panelUI.classList.remove('modo-escucha');
            if (activo && !hablando && !escuchaActivada) {
                // Pequeño delay de reintento si no se captó nada
                setTimeout(() => { if(activo && !hablando) try { recognition.start(); } catch(e){} }, 800);
            }
        };

        function hablar(texto, letra) {
            hablando = true;
            escuchaActivada = false;
            recognition.stop();
            statusUI.innerText = "SISTEMA HABLANDO...";
            
            const locucion = new SpeechSynthesisUtterance(`${FONETICA[letra] || 'con la ' + letra}: ${texto}`);
            locucion.lang = 'es-ES';
            locucion.rate = 1.0;

            locucion.onend = () => {
                setTimeout(() => {
                    hablando = false;
                    preguntaUI.innerText = `${letra}: ${texto}`;
                    if(activo) try { recognition.start(); } catch(e){}
                }, 800); // Espera 0.8s para que no capte el eco
            };
            window.speechSynthesis.speak(locucion);
        }

        function verificar() {
            hablando = true; // Bloqueo temporal
            const resUser = normalizar(inputUI.value);
            const actual = preguntas[currentIndex];
            const letraNorm = normalizar(actual.letra);
            
            if (resUser.includes("pasapalabra")) {
                inputUI.value = ""; pasapalabra(); return;
            }

            // Validación estricta: debe empezar por la letra (salvo X)
            const cumpleLetra = (letraNorm === 'x') ? resUser.includes('x') : resUser.startsWith(letraNorm);

            if (cumpleLetra && (resUser.includes(normalizar(actual.r)) || normalizar(actual.r).includes(resUser))) {
                actual.estado = 'acierto';
                document.getElementById(`letra-${currentIndex}`).classList.add('acertada');
                inputUI.value = "";
                hablando = false;
                siguiente();
            } else {
                actual.estado = 'fallo';
                document.getElementById(`letra-${currentIndex}`).classList.add('fallada');
                const feedback = new SpeechSynthesisUtterance(`Error, era ${actual.r}`);
                feedback.onend = () => { inputUI.value = ""; hablando = false; siguiente(); };
                window.speechSynthesis.speak(feedback);
            }
        }

        function siguiente() {
            let vueltas = 0;
            while (preguntas[currentIndex].estado && vueltas < 25) {
                currentIndex = (currentIndex + 1) % 25;
                vueltas++;
            }
            if (vueltas === 25) { finalizar(); return; }
            
            document.querySelectorAll('.letra').forEach(l => l.classList.remove('activa'));
            document.getElementById(`letra-${currentIndex}`).classList.add('activa');
            hablar(preguntas[currentIndex].p, preguntas[currentIndex].letra);
        }

        function pasapalabra() {
            hablando = true;
            statusUI.innerText = "PASANDO PALABRA...";
            const voz = new SpeechSynthesisUtterance("Pasamos palabra");
            voz.onend = () => { 
                currentIndex = (currentIndex + 1) % 25; 
                hablando = false; siguiente(); 
            };
            window.speechSynthesis.speak(voz);
        }

        function finalizar() {
            activo = false; 
            clearInterval(timer);
            recognition.stop();
            const ok = preguntas.filter(p => p.estado === 'acierto').length;
            preguntaUI.innerText = `JUEGO TERMINADO. Aciertos: ${ok}`;
            statusUI.innerText = "";
            document.getElementById('input-area').classList.add('hidden');
            document.getElementById('btn-start').classList.remove('hidden');
        }

        document.getElementById('btn-start').addEventListener('click', () => {
            preguntas = Object.keys(banco).sort().map(l => ({letra: l, ...banco[l][0], estado: null}));
            const rosco = document.getElementById('rosco-letras');
            rosco.innerHTML = "";
            preguntas.forEach((p, i) => {
                const li = document.createElement('li'); li.className = 'letra'; li.innerText = p.letra; li.id = `letra-${i}`;
                const angle = (i * (360 / 25)) - 90;
                li.style.left = `${250 + 220 * Math.cos(angle * Math.PI / 180)}px`;
                li.style.top = `${250 + 220 * Math.sin(angle * Math.PI / 180)}px`;
                rosco.appendChild(li);
            });
            document.getElementById('btn-start').classList.add('hidden');
            document.getElementById('input-area').classList.remove('hidden');
            activo = true; tiempo = 120; currentIndex = 0;
            timer = setInterval(() => { if(!hablando) { tiempo--; document.getElementById('timer').innerText = tiempo; if(tiempo<=0) finalizar(); }}, 1000);
            siguiente();
        });

        document.getElementById('btn-enviar').addEventListener('click', verificar);
        document.getElementById('btn-pasapalabra').addEventListener('click', pasapalabra);
        document.getElementById('btn-micro').addEventListener('click', () => { if(!hablando) try { recognition.start(); } catch(e){} });
    </script>
</body>
</html>
