    <style>
        :root {
            --azul-pasapalabra: #0056b3;
            --verde-acierto: #28a745;
            --rojo-fallo: #dc3545;
            --naranja-espera: #ffc107;
            --morado-voz: #9b59b6;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #1a1a2e;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 600px;
            height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .rosco {
            position: relative;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            list-style: none;
            padding: 0;
        }

        .letra {
            position: absolute;
            width: 38px;
            height: 38px;
            background: var(--azul-pasapalabra);
            border: 2px solid white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
            transform: translate(-50%, -50%);
            transition: all 0.3s;
        }

        .acertada { background: var(--verde-acierto); box-shadow: 0 0 10px var(--verde-acierto); }
        .fallada { background: var(--rojo-fallo); box-shadow: 0 0 10px var(--rojo-fallo); }
        .activa { transform: translate(-50%, -50%) scale(1.3); border-color: var(--naranja-espera); box-shadow: 0 0 15px var(--naranja-espera); z-index: 10; }

        #central-panel {
            position: absolute;
            text-align: center;
            width: 320px;
            z-index: 5;
        }

        #timer { font-size: 3.5rem; font-weight: bold; margin-bottom: 10px; text-shadow: 2px 2px 5px black; }
        
        #pregunta-box {
            background: rgba(255, 255, 255, 0.15);
            padding: 20px;
            border-radius: 15px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        #input-area {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-direction: column;
        }

        .voice-controls {
            margin-bottom: 10px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        input[type="text"] {
            padding: 10px;
            font-size: 1rem;
            border-radius: 8px;
            border: none;
            text-align: center;
        }

        .buttons { display: flex; gap: 5px; justify-content: center; flex-wrap: wrap; }
        
        button {
            padding: 10px 15px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            font-weight: bold;
        }

        #btn-micro { background: var(--morado-voz); color: white; }
        #btn-enviar { background: var(--verde-acierto); color: white; }
        #btn-pasapalabra { background: var(--naranja-espera); color: black; }
        #btn-start { background: white; color: #1a1a2e; font-size: 1.5rem; padding: 15px 40px; }

        .escuchando {
            animation: pulse 1.2s infinite;
            background: #ff4b2b !important;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 75, 43, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(255, 75, 43, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 75, 43, 0); }
        }

        .hidden { display: none !important; }

        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--morado-voz); }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>

            preguntasPartida = [];
            const letras = Object.keys(bancoPreguntas).sort();
            letras.forEach(letra => {

                const elegida = opciones[Math.floor(Math.random() * opciones.length)];
                preguntasPartida.push({
                    letra: letra,
                    ...elegida,
                    estado: null
                });
            });
        }

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'es-ES';
            recognition.interimResults = false;

            recognition.onstart = () => {
                document.getElementById('btn-micro').classList.add('escuchando');
                statusVozUI.innerText = "TE ESCUCHO...";
            };

            recognition.onresult = (event) => {
                const voiceResult = event.results[0][0].transcript.toLowerCase().trim();
                if (voiceResult.includes("pasapalabra")) {
                    pasapalabra();
                } else {
                    inputUI.value = voiceResult;
                    statusVozUI.innerText = `HE OÍDO: "${voiceResult}"`;
                    setTimeout(verificarRespuesta, 600);
                }
            };

            recognition.onend = () => {
                document.getElementById('btn-micro').classList.remove('escuchando');
                statusVozUI.innerText = "";
                if (autoMicroToggle.checked && !sistemaHablando && juegoActivo) {
                    try { recognition.start(); } catch(e){}

            };

            preguntaUI.innerText = "..."; 
            const utterance = new SpeechSynthesisUtterance(texto);
            utterance.lang = 'es-ES';
            utterance.onend = () => {
                sistemaHablando = false;
                preguntaUI.innerText = texto;
                if(callback) callback();
                if (autoMicroToggle.checked && juegoActivo) try { recognition.start(); } catch(e){}
            };
            window.speechSynthesis.speak(utterance);
        }

        function siguientePregunta() {
            let vueltas = 0;
            while (preguntasPartida[currentIndex].estado && vueltas < preguntasPartida.length) {
                currentIndex = (currentIndex + 1) % preguntasPartida.length;
                vueltas++;
            }

            if (vueltas === preguntasPartida.length) {
                finalizarJuego(true);
                return;
            }

            document.querySelectorAll('.letra').forEach(l => l.classList.remove('activa'));
            document.getElementById(`letra-${currentIndex}`).classList.add('activa');
            hablar(preguntasPartida[currentIndex].pregunta);
        }

        function verificarRespuesta() {
            if (sistemaHablando) return;
            const resUser = inputUI.value.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
            if (!resUser) return;

            const actual = preguntasPartida[currentIndex];
            const letraActual = document.getElementById(`letra-${currentIndex}`);
            const resCorrecta = actual.respuesta.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            
            inputUI.value = "";

            if (resUser === resCorrecta) {
                actual.estado = 'acierto';
                letraActual.classList.add('acertada');
                siguientePregunta();
            } else {
                actual.estado = 'fallo';
                letraActual.classList.add('fallada');
                hablar(`Error. Era ${actual.respuesta}`, () => {
                    setTimeout(siguientePregunta, 300);
                });
            }
        }

        function pasapalabra() {
            if (sistemaHablando) return;
            if(recognition) recognition.stop();
            hablar("PASAMOS PALABRA", () => {
                currentIndex = (currentIndex + 1) % preguntasPartida.length;
                siguientePregunta();
            });
        }

        function iniciarCronometro() {
            timerInterval = setInterval(() => {
                if (!sistemaHablando && juegoActivo) {
                    tiempoRestante--;
                    timerUI.innerText = tiempoRestante;
                    if (tiempoRestante <= 0) finalizarJuego(false);
                }
            }, 1000);
        }

        function initRoscoUI() {
            roscoUI.innerHTML = "";
            preguntasPartida.forEach((p, i) => {
                const li = document.createElement('li');
                li.className = 'letra';
                li.innerText = p.letra;
                li.id = `letra-${i}`;
                const angle = (i * (360 / preguntasPartida.length)) - 90;
                li.style.left = `${250 + 220 * Math.cos(angle * Math.PI / 180)}px`;
                li.style.top = `${250 + 220 * Math.sin(angle * Math.PI / 180)}px`;
                roscoUI.appendChild(li);
            });
        }

        function finalizarJuego(completado) {
            clearInterval(timerInterval);
            juegoActivo = false;
            if(recognition) recognition.stop();
            const aciertos = preguntasPartida.filter(p => p.estado === 'acierto').length;
            preguntaUI.innerText = `RESULTADO: ${aciertos} aciertos.`;
            document.getElementById('input-area').classList.add('hidden');
            document.getElementById('btn-start').innerText = "JUGAR OTRA VEZ";
            document.getElementById('btn-start').classList.remove('hidden');
        }

        document.getElementById('btn-start').addEventListener('click', () => {
            document.getElementById('btn-start').classList.add('hidden');
            document.getElementById('input-area').classList.remove('hidden');
            tiempoRestante = 120;
            currentIndex = 0;
            juegoActivo = true;
            seleccionarPreguntasAleatorias();
            initRoscoUI();
            iniciarCronometro();
            siguientePregunta();
        });

        document.getElementById('btn-micro').addEventListener('click', () => {
            if (!recognition) return alert("Micro no soportado");
            try { recognition.start(); } catch(e){}
        });

        document.getElementById('btn-enviar').addEventListener('click', verificarRespuesta);
        document.getElementById('btn-pasapalabra').addEventListener('click', pasapalabra);
        inputUI.addEventListener('keypress', (e) => { if(e.key === 'Enter') verificarRespuesta(); });
    </script>
</body>
</html>
