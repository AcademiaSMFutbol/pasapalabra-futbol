<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasapalabra Fútbol - Gran Final</title>
    <style>
        :root {
            --azul-pasapalabra: #0056b3;
            --verde-acierto: #28a745;
            --rojo-fallo: #dc3545;
            --naranja-espera: #ffc107;
            --morado-escucha: #9b59b6;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #1a1a2e;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container { position: relative; width: 600px; height: 600px; display: flex; align-items: center; justify-content: center; }
        .rosco { position: relative; width: 500px; height: 500px; border-radius: 50%; list-style: none; padding: 0; }
        .letra { position: absolute; width: 38px; height: 38px; background: var(--azul-pasapalabra); border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.1rem; transform: translate(-50%, -50%); transition: all 0.3s; }
        .acertada { background: var(--verde-acierto); box-shadow: 0 0 10px var(--verde-acierto); }
        .fallada { background: var(--rojo-fallo); }
        .activa { transform: translate(-50%, -50%) scale(1.3); border-color: var(--naranja-espera); box-shadow: 0 0 15px var(--naranja-espera); z-index: 10; }

        #central-panel { position: absolute; text-align: center; width: 340px; z-index: 5; transition: 0.3s; padding: 20px; border-radius: 20px; background: rgba(0,0,0,0.3); }
        .modo-escucha { background: rgba(155, 89, 182, 0.3) !important; border: 2px solid var(--morado-escucha); }
        
        #timer { font-size: 3.5rem; font-weight: bold; margin-bottom: 5px; }
        #pregunta-box { min-height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #status-voz { font-size: 1.2rem; font-weight: bold; color: var(--morado-escucha); text-transform: uppercase; height: 1.5em; margin-top: 10px; }
        
        input[type="text"] { padding: 12px; font-size: 1.1rem; border-radius: 8px; border: none; text-align: center; width: 80%; margin: 15px auto 0; display: block; }
        .buttons { display: flex; gap: 5px; justify-content: center; margin-top: 10px; }
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; text-transform: uppercase; }
        
        #btn-start { background: white; color: #1a1a2e; font-size: 1.5rem; padding: 15px 40px; margin-top: 20px; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        .hidden { display: none !important; }

        @keyframes victoria {
            0% { box-shadow: 0 0 20px gold; }
            50% { box-shadow: 0 0 50px white; }
            100% { box-shadow: 0 0 20px gold; }
        }
        .celebracion { animation: victoria 0.5s infinite; }
    </style>
</head>
<body>

    <h1 id="titulo">PASAPALABRA FÚTBOL</h1>

    <div id="game-container">
        <ul class="rosco" id="rosco-letras"></ul>
        <div id="central-panel">
            <div id="timer">120</div>
            <div id="pregunta-box">
                <span id="texto-pregunta">¿Preparado para la gloria?</span>
                <div id="status-voz"></div>
            </div>
            <div id="input-area" class="hidden">
                <input type="text" id="user-answer" placeholder="..." autocomplete="off">
                <div class="buttons">
                    <button id="btn-micro" style="background:var(--morado-escucha); color:white;">🎤</button>
                    <button id="btn-enviar" style="background:var(--verde-acierto); color:white;">OK</button>
                    <button id="btn-pasapalabra" style="background:var(--naranja-espera);">PASAPALABRA</button>
                </div>
            </div>
            <button id="btn-start">EMPEZAR PARTIDO</button>
        </div>
    </div>

    <script>
        // --- AUDIO ENGINE (STADIUM & APPLAUSE) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function crearRuidoEstadio() {
            const bufferSize = 2 * audioCtx.sampleRate,
                buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate),
                output = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) { output[i] = Math.random() * 2 - 1; }

            const whiteNoise = audioCtx.createBufferSource();
            whiteNoise.buffer = buffer;
            whiteNoise.loop = true;

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 1000;

            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 2);

            whiteNoise.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            whiteNoise.start();
            return gainNode;
        }

        function sonarAplausos() {
            const playClap = () => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150 + Math.random() * 100, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            };
            let i = 0;
            const interval = setInterval(() => {
                playClap(); if (i++ > 40) clearInterval(interval);
            }, 150);
        }

        // --- GAME LOGIC ---
        const FONETICA_LETRAS = {'I': 'con la i latina', 'V': 'con la uve', 'X': 'contiene la equis', 'Y': 'con la i griega'};
        const banco = {
            'A': [{r:['Alisson', 'Alison'], p:'Portero brasileño del Liverpool.'}],
            'B': [{r:['Benzema'], p:'Ex delantero del Madrid y Balón de Oro.'}],
            'C': [{r:['Courtois'], p:'Portero belga del Real Madrid.'}],
            'D': [{r:['Drogba'], p:'Leyenda de Costa de Marfil.'}],
            'E': [{r:['Etoo'], p:'Delantero camerunés del Barça e Inter.'}],
            'F': [{r:['Foden'], p:'Estrella inglesa del Manchester City.'}],
            'G': [{r:['Gavi', 'Gabi'], p:'Joven centrocampista del Barça.'}],
            'H': [{r:['Haaland'], p:'El androide noruego del gol.'}],
            'I': [{r:['Iniesta'], p:'El autor del gol en Johannesburgo.'}],
            'J': [{r:['Jorginho'], p:'Centrocampista italiano campeón de Europa.'}],
            'K': [{r:['Kane'], p:'Capitán y máximo goleador de Inglaterra.'}],
            'L': [{r:['Lewandowski'], p:'Delantero polaco del Barcelona.'}],
            'M': [{r:['Messi'], p:'El astro argentino campeón del mundo.'}],
            'N': [{r:['Neymar', 'Neimar'], p:'Estrella brasileña que pasó por el PSG.'}],
            'O': [{r:['Oblak'], p:'Portero esloveno del Atlético.'}],
            'P': [{r:['Puyol'], p:'Eterno capitán del F.C. Barcelona.'}],
            'Q': [{r:['Quaresma', 'Cuaresma'], p:'Portugués famoso por su trivela.'}],
            'R': [{r:['Ronaldo'], p:'Cristiano o el Fenómeno.'}],
            'S': [{r:['Suarez'], p:'El pistolero uruguayo.'}],
            'T': [{r:['Ter Stegen'], p:'Portero alemán del Barcelona.'}],
            'U': [{r:['Unai Simon'], p:'Portero titular de España.'}],
            'V': [{r:['Vinicius'], p:'Extremo brasileño del Real Madrid.'}],
            'X': [{r:['Xavi'], p:'Contiene la equis: Director del mejor Barça.'}],
            'Y': [{r:['Yashin', 'Yasin'], p:'La araña negra soviética.'}],
            'Z': [{r:['Zidane'], p:'Mago francés de la volea.'}]
        };

        let preguntas = [], currentIndex = 0, tiempo = 120, timer, activo = false, hablando = false, escuchaActivada = false;
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-ES';

        function súperNormalizar(str) {
            return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/sh/g, 's').replace(/ll/g, 'y').replace(/v/g, 'b').replace(/([^a-z0-9])/g, "").replace(/(.)\1+/g, '$1');
        }

        recognition.onstart = () => { if (hablando) { recognition.stop(); return; } escuchaActivada = true; document.getElementById('central-panel').classList.add('modo-escucha'); document.getElementById('status-voz').innerHTML = '<span class="blink">● HABLA AHORA ●</span>'; };
        recognition.onresult = (e) => { if (!escuchaActivada) return; const res = e.results[0][0].transcript; document.getElementById('user-answer').value = res; document.getElementById('status-voz').innerText = `Oído: ${res}`; escuchaActivada = false; setTimeout(verificar, 400); };
        recognition.onend = () => { document.getElementById('central-panel').classList.remove('modo-escucha'); if (activo && !hablando && !escuchaActivada) setTimeout(() => { if(activo && !hablando) try { recognition.start(); } catch(e){} }, 800); };

        function hablar(texto, letra) {
            hablando = true; escuchaActivada = false; recognition.stop();
            const voz = new SpeechSynthesisUtterance(`${FONETICA_LETRAS[letra] || 'con la ' + letra}: ${texto}`);
            voz.lang = 'es-ES';
            voz.onend = () => { setTimeout(() => { hablando = false; document.getElementById('texto-pregunta').innerText = `${letra}: ${texto}`; if(activo) try { recognition.start(); } catch(e){} }, 800); };
            window.speechSynthesis.speak(voz);
        }

        function verificar() {
            hablando = true;
            const resUser = súperNormalizar(document.getElementById('user-answer').value);
            const actual = preguntas[currentIndex];
            const letraNorm = actual.letra.toLowerCase();
            if (resUser.includes("pasapalabra")) { document.getElementById('user-answer').value = ""; pasapalabra(); return; }

            const esValido = actual.r.some(n => {
                const nNorm = súperNormalizar(n);
                const okIni = (letraNorm === 'q') ? (resUser.startsWith('q') || resUser.startsWith('c')) : (letraNorm === 'y') ? (resUser.startsWith('y') || resUser.startsWith('i')) : (letraNorm === 'x') ? resUser.includes('x') : (resUser.startsWith(letraNorm) || (letraNorm === 'b' && resUser.startsWith('v')) || (letraNorm === 'v' && resUser.startsWith('b')));
                return okIni && (resUser.includes(nNorm) || nNorm.includes(resUser));
            });

            if (esValido) {
                actual.estado = 'acierto';
                document.getElementById(`letra-${currentIndex}`).classList.add('acertada');
                document.getElementById('user-answer').value = ""; hablando = false; siguiente();
            } else {
                actual.estado = 'fallo';
                document.getElementById(`letra-${currentIndex}`).classList.add('fallada');
                const fb = new SpeechSynthesisUtterance(`Error, era ${actual.r[0]}`);
                fb.lang = 'es-ES'; fb.onend = () => { document.getElementById('user-answer').value = ""; hablando = false; siguiente(); };
                window.speechSynthesis.speak(fb);
            }
        }

        function siguiente() {
            let v = 0;
            while (preguntas[currentIndex].estado && v < 25) { currentIndex = (currentIndex + 1) % 25; v++; }
            if (v === 25) { finalizar(); return; }
            document.querySelectorAll('.letra').forEach(l => l.classList.remove('activa'));
            document.getElementById(`letra-${currentIndex}`).classList.add('activa');
            hablar(preguntas[currentIndex].p, preguntas[currentIndex].letra);
        }

        function pasapalabra() {
            hablando = true; const v = new SpeechSynthesisUtterance("Pasamos palabra");
            v.onend = () => { currentIndex = (currentIndex + 1) % 25; hablando = false; siguiente(); };
            window.speechSynthesis.speak(v);
        }

        function finalizar() {
            activo = false; clearInterval(timer); recognition.stop();
            const aciertos = preguntas.filter(p => p.estado === 'acierto').length;
            
            if (aciertos === 25) {
                document.getElementById('texto-pregunta').innerText = "¡INCREÍBLE! ¡HAS COMPLETADO EL ROSCO!";
                document.getElementById('central-panel').classList.add('celebracion');
                crearRuidoEstadio();
                sonarAplausos();
            } else {
                document.getElementById('texto-pregunta').innerText = `FIN. Aciertos: ${aciertos}`;
            }
            
            document.getElementById('input-area').classList.add('hidden');
            document.getElementById('btn-start').classList.remove('hidden');
        }

        document.getElementById('btn-start').addEventListener('click', () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('central-panel').classList.remove('celebracion');
            preguntas = Object.keys(banco).sort().map(l => ({letra: l, ...banco[l][0], estado: null}));
            const rosco = document.getElementById('rosco-letras'); rosco.innerHTML = "";
            preguntas.forEach((p, i) => {
                const li = document.createElement('li'); li.className = 'letra'; li.innerText = p.letra; li.id = `letra-${i}`;
                const angle = (i * (360 / 25)) - 90;
                li.style.left = `${250 + 220 * Math.cos(angle * Math.PI / 180)}px`;
                li.style.top = `${250 + 220 * Math.sin(angle * Math.PI / 180)}px`;
                rosco.appendChild(li);
            });
            document.getElementById('btn-start').classList.add('hidden');
            document.getElementById('input-area').classList.remove('hidden');
            activo = true; tiempo = 120; currentIndex = 0;
            timer = setInterval(() => { if(!hablando) { tiempo--; document.getElementById('timer').innerText = tiempo; if(tiempo<=0) finalizar(); }}, 1000);
            siguiente();
        });

        document.getElementById('btn-enviar').addEventListener('click', verificar);
        document.getElementById('btn-pasapalabra').addEventListener('click', pasapalabra);
        document.getElementById('btn-micro').addEventListener('click', () => { if(!hablando) try { recognition.start(); } catch(e){} });
    </script>
</body>
</html>
