<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasapalabra Fútbol - Competición Estricta</title>
    <style>
        :root {
            --azul-pasapalabra: #0056b3;
            --verde-acierto: #28a745;
            --rojo-fallo: #dc3545;
            --naranja-espera: #ffc107;
            --morado-voz: #9b59b6;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #1a1a2e;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container { position: relative; width: 600px; height: 600px; display: flex; align-items: center; justify-content: center; }
        .rosco { position: relative; width: 500px; height: 500px; border-radius: 50%; list-style: none; padding: 0; }
        .letra { position: absolute; width: 38px; height: 38px; background: var(--azul-pasapalabra); border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.1rem; transform: translate(-50%, -50%); transition: all 0.3s; }
        .acertada { background: var(--verde-acierto); box-shadow: 0 0 10px var(--verde-acierto); }
        .fallada { background: var(--rojo-fallo); box-shadow: 0 0 10px var(--rojo-fallo); }
        .activa { transform: translate(-50%, -50%) scale(1.3); border-color: var(--naranja-espera); box-shadow: 0 0 15px var(--naranja-espera); z-index: 10; }
        #central-panel { position: absolute; text-align: center; width: 340px; z-index: 5; }
        #timer { font-size: 3.5rem; font-weight: bold; margin-bottom: 5px; }
        #pregunta-box { background: rgba(255, 255, 255, 0.15); padding: 20px; border-radius: 15px; min-height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2); }
        #input-area { margin-top: 15px; display: flex; gap: 10px; flex-direction: column; }
        input[type="text"] { padding: 10px; font-size: 1rem; border-radius: 8px; border: none; text-align: center; }
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; }
        #btn-micro { background: var(--morado-voz); color: white; }
        #btn-enviar { background: var(--verde-acierto); color: white; }
        #btn-pasapalabra { background: var(--naranja-espera); color: black; }
        #btn-start { background: white; color: #1a1a2e; font-size: 1.5rem; padding: 15px 40px; }
        .escuchando { animation: pulse 1s infinite; background: #ff4b2b !important; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <h1>PASAPALABRA FÚTBOL COMPETICIÓN</h1>

    <div id="game-container">
        <ul class="rosco" id="rosco-letras"></ul>
        <div id="central-panel">
            <div id="timer">120</div>
            <div id="pregunta-box">
                <span id="texto-pregunta">Pulsa para empezar</span>
                <small id="status-voz" style="margin-top: 10px; color: #ffeb3b; font-weight: bold;"></small>
            </div>
            <div id="input-area" class="hidden">
                <input type="text" id="user-answer" placeholder="Responde..." autocomplete="off">
                <div style="display:flex; gap:5px; margin-top:10px;">
                    <button id="btn-micro">🎤</button>
                    <button id="btn-enviar">ENVIAR</button>
                    <button id="btn-pasapalabra">PASAPALABRA</button>
                </div>
            </div>
            <button id="btn-start">EMPEZAR</button>
        </div>
    </div>

    <script>
        const FONETICA = {'I': 'con la i latina', 'V': 'con la uve', 'X': 'contiene la equis', 'Y': 'con la i griega'};
        
        // Banco de datos ajustado para que la letra coincida con el inicio de la respuesta (excepto X)
        const banco = {
            'A': [{r:'Alisson', p:'Portero brasileño del Liverpool.'}],
            'B': [{r:'Benzema', p:'Ex delantero del Real Madrid y Balón de Oro.'}],
            'C': [{r:'Courtois', p:'Portero belga del Real Madrid.'}],
            'D': [{r:'Drogba', p:'Leyenda de Costa de Marfil.'}],
            'E': [{r:'Etoo', p:'Delantero camerunés del Barça.'}],
            'F': [{r:'Foden', p:'Estrella inglesa del Manchester City.'}],
            'G': [{r:'Gavi', p:'Joven centrocampista del Barcelona.'}],
            'H': [{r:'Haaland', p:'El delantero noruego del City.'}],
            'I': [{r:'Iniesta', p:'Marcó el gol del mundial de España.'}],
            'J': [{r:'Jorginho', p:'Centrocampista italiano campeón de Europa.'}],
            'K': [{r:'Kane', p:'Capitán y goleador de Inglaterra.'}],
            'L': [{r:'Lewandowski', p:'Goleador polaco del Barça.'}],
            'M': [{r:'Messi', p:'El astro argentino del Inter Miami.'}],
            'N': [{r:'Neymar', p:'Estrella brasileña que pasó por el PSG.'}],
            'O': [{r:'Oblak', p:'El muro esloveno del Atlético.'}],
            'P': [{r:'Puyol', p:'Capitán histórico del F.C. Barcelona.'}],
            'Q': [{r:'Quaresma', p:'Jugador portugués famoso por la trivela.'}],
            'R': [{r:'Ronaldo', p:'El fenómeno brasileño o el astro portugués.'}],
            'S': [{r:'Suarez', p:'El pistolero uruguayo.'}],
            'T': [{r:'Ter Stegen', p:'Portero alemán del Barcelona.'}],
            'U': [{r:'Unai Simon', p:'Portero titular de la selección española.'}],
            'V': [{r:'Vinicius', p:'Extremo brasileño del Real Madrid.'}],
            'X': [{r:'Xavi', p:'Contiene la equis: Director del mejor Barça.'}],
            'Y': [{r:'Yashin', p:'La araña negra del fútbol soviético.'}],
            'Z': [{r:'Zidane', p:'Leyenda francesa de la volea eterna.'}]
        };

        let preguntas = [], currentIndex = 0, tiempo = 120, timer, activo = false, hablando = false;
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-ES';

        // --- MOTOR DE VALIDACIÓN ESTRICTA ---
        function normalizar(str) {
            return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, "");
        }

        // Levenshtein para flexibilidad fonética (errores de pronunciación del micro)
        function editDistance(s1, s2) {
            s1 = s1.toLowerCase(); s2 = s2.toLowerCase();
            let costs = [];
            for (let i = 0; i <= s1.length; i++) {
                let lastValue = i;
                for (let j = 0; j <= s2.length; j++) {
                    if (i === 0) costs[j] = j;
                    else if (j > 0) {
                        let newValue = costs[j - 1];
                        if (s1.charAt(i - 1) !== s2.charAt(j - 1)) newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
                        costs[j - 1] = lastValue; lastValue = newValue;
                    }
                }
                if (i > 0) costs[s2.length] = lastValue;
            }
            return costs[s2.length];
        }

        function esCorrecto(userRaw, correctRaw, letra) {
            const user = normalizar(userRaw);
            const correct = normalizar(correctRaw);
            const letraNorm = normalizar(letra);

            // REGLA DE ORO: Si no es la X, la respuesta del usuario DEBE empezar por la letra correcta
            if (letraNorm !== 'x' && !user.startsWith(letraNorm)) {
                return false; 
            }
            
            // Si es la X, debe contener la letra
            if (letraNorm === 'x' && !user.includes('x')) {
                return false;
            }

            // Comparación de similitud (90% de coincidencia para ser estrictos pero permitir errores de micro)
            const distancia = editDistance(user, correct);
            const similitud = (Math.max(user.length, correct.length) - distancia) / Math.max(user.length, correct.length);
            
            return similitud > 0.85; 
        }
        // ------------------------------------

        recognition.onresult = (e) => {
            if (hablando) return;
            const res = e.results[0][0].transcript;
            document.getElementById('user-answer').value = res;
            document.getElementById('status-voz').innerText = `Oído: "${res}"`;
            setTimeout(verificar, 500);
        };

        recognition.onend = () => {
            document.getElementById('btn-micro').classList.remove('escuchando');
            if (activo && !hablando) setTimeout(() => { try { recognition.start(); } catch(e){} }, 800);
        };

        function hablar(texto, letra) {
            hablando = true;
            if(recognition) recognition.stop();
            const voz = new SpeechSynthesisUtterance(`${FONETICA[letra] || 'con la ' + letra}: ${texto}`);
            voz.lang = 'es-ES';
            voz.onend = () => { setTimeout(() => { hablando = false; if(activo) recognition.start(); }, 1000); };
            window.speechSynthesis.speak(voz);
            document.getElementById('texto-pregunta').innerText = `${letra}: ${texto}`;
        }

        function verificar() {
            if (hablando) return;
            const input = document.getElementById('user-answer');
            const actual = preguntas[currentIndex];
            const letraUI = document.getElementById(`letra-${currentIndex}`);
            
            if (normalizar(input.value).includes("pasapalabra")) {
                input.value = ""; pasapalabra(); return;
            }

            if (esCorrecto(input.value, actual.r, actual.letra)) {
                actual.estado = 'acierto';
                letraUI.classList.add('acertada');
                input.value = ""; siguiente();
            } else {
                actual.estado = 'fallo';
                letraUI.classList.add('fallada');
                hablando = true;
                const errorVoz = new SpeechSynthesisUtterance(`Error, la respuesta correcta era ${actual.r}`);
                errorVoz.onend = () => { input.value = ""; hablando = false; siguiente(); };
                window.speechSynthesis.speak(errorVoz);
            }
        }

        function siguiente() {
            let vueltas = 0;
            while (preguntas[currentIndex].estado && vueltas < 25) {
                currentIndex = (currentIndex + 1) % 25;
                vueltas++;
            }
            if (vueltas === 25) { finalizar(); return; }
            document.querySelectorAll('.letra').forEach(l => l.classList.remove('activa'));
            document.getElementById(`letra-${currentIndex}`).classList.add('activa');
            hablar(preguntas[currentIndex].p, preguntas[currentIndex].letra);
        }

        function pasapalabra() {
            const voz = new SpeechSynthesisUtterance("Pasamos palabra");
            hablando = true;
            voz.onend = () => { 
                currentIndex = (currentIndex + 1) % 25; 
                hablando = false; siguiente(); 
            };
            window.speechSynthesis.speak(voz);
        }

        function finalizar() {
            activo = false; clearInterval(timer);
            const ok = preguntas.filter(p => p.estado === 'acierto').length;
            document.getElementById('texto-pregunta').innerText = `FIN. Aciertos: ${ok}`;
            document.getElementById('input-area').classList.add('hidden');
            document.getElementById('btn-start').classList.remove('hidden');
        }

        document.getElementById('btn-start').addEventListener('click', () => {
            preguntas = Object.keys(banco).sort().map(l => ({letra: l, ...banco[l][0], estado: null}));
            const rosco = document.getElementById('rosco-letras');
            rosco.innerHTML = "";
            preguntas.forEach((p, i) => {
                const li = document.createElement('li'); li.className = 'letra'; li.innerText = p.letra; li.id = `letra-${i}`;
                const angle = (i * (360 / 25)) - 90;
                li.style.left = `${250 + 220 * Math.cos(angle * Math.PI / 180)}px`;
                li.style.top = `${250 + 220 * Math.sin(angle * Math.PI / 180)}px`;
                rosco.appendChild(li);
            });
            document.getElementById('btn-start').classList.add('hidden');
            document.getElementById('input-area').classList.remove('hidden');
            activo = true; tiempo = 120; currentIndex = 0;
            timer = setInterval(() => { if(!hablando) { tiempo--; document.getElementById('timer').innerText = tiempo; if(tiempo<=0) finalizar(); }}, 1000);
            siguiente();
        });
        
        document.getElementById('btn-enviar').addEventListener('click', verificar);
        document.getElementById('btn-pasapalabra').addEventListener('click', pasapalabra);
    </script>
</body>
</html>
