<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasapalabra Fútbol - 150 Jugadores</title>
    <style>
        :root {
            --azul-pasapalabra: #0056b3;
            --verde-acierto: #28a745;
            --rojo-fallo: #dc3545;
            --naranja-espera: #ffc107;
            --morado-escucha: #9b59b6;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #1a1a2e;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container { position: relative; width: 600px; height: 600px; display: flex; align-items: center; justify-content: center; }
        .rosco { position: relative; width: 500px; height: 500px; border-radius: 50%; list-style: none; padding: 0; }
        .letra { position: absolute; width: 36px; height: 36px; background: var(--azul-pasapalabra); border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1rem; transform: translate(-50%, -50%); transition: all 0.3s; }
        .acertada { background: var(--verde-acierto); box-shadow: 0 0 10px var(--verde-acierto); }
        .fallada { background: var(--rojo-fallo); }
        .activa { transform: translate(-50%, -50%) scale(1.3); border-color: var(--naranja-espera); box-shadow: 0 0 15px var(--naranja-espera); z-index: 10; }

        #central-panel { position: absolute; text-align: center; width: 340px; z-index: 5; transition: 0.3s; padding: 20px; border-radius: 20px; background: rgba(0,0,0,0.3); }
        .modo-escucha { background: rgba(155, 89, 182, 0.4) !important; border: 2px solid var(--morado-escucha); }
        
        #timer { font-size: 3rem; font-weight: bold; margin-bottom: 5px; }
        #pregunta-box { min-height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #status-voz { font-size: 1rem; font-weight: bold; color: var(--morado-escucha); text-transform: uppercase; height: 1.5em; margin-top: 5px; }
        
        input[type="text"] { padding: 12px; font-size: 1.1rem; border-radius: 8px; border: none; text-align: center; width: 85%; margin: 10px auto 0; display: block; }
        .buttons { display: flex; gap: 5px; justify-content: center; margin-top: 10px; }
        button { padding: 10px 12px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }
        
        #btn-start { background: white; color: #1a1a2e; font-size: 1.5rem; padding: 15px 40px; margin-top: 20px; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        .hidden { display: none !important; }
        .celebracion { animation: victoria 0.5s infinite; }
        @keyframes victoria { 0%, 100% { box-shadow: 0 0 20px gold; } 50% { box-shadow: 0 0 50px white; } }
    </style>
</head>
<body>

    <h1>PASAPALABRA FÚTBOL PRO</h1>

    <div id="game-container">
        <ul class="rosco" id="rosco-letras"></ul>
        <div id="central-panel">
            <div id="timer">120</div>
            <div id="pregunta-box">
                <span id="texto-pregunta">150 jugadores listos en el vestuario...</span>
                <div id="status-voz"></div>
            </div>
            <div id="input-area" class="hidden">
                <input type="text" id="user-answer" placeholder="Responde..." autocomplete="off">
                <div class="buttons">
                    <button id="btn-micro" style="background:var(--morado-escucha); color:white;">🎤 MICRO</button>
                    <button id="btn-enviar" style="background:var(--verde-acierto); color:white;">ENVIAR</button>
                    <button id="btn-pasapalabra" style="background:var(--naranja-espera);">PASAPALABRA</button>
                </div>
            </div>
            <button id="btn-start">EMPEZAR PARTIDO</button>
        </div>
    </div>

        function sonarExito() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(220, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 3);
        }

        let preguntasActuales = [], currentIndex = 0, tiempo = 120, timer, activo = false, hablando = false, escuchaActivada = false;
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-ES';

        function súperNormalizar(str) {
            return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/sh/g, 's').replace(/ss/g, 's').replace(/ll/g, 'y').replace(/v/g, 'b').replace(/([^a-z0-9])/g, "").replace(/(.)\1+/g, '$1');
        }

        recognition.onstart = () => { 
            if (hablando) { recognition.stop(); return; }
            escuchaActivada = true;
            document.getElementById('central-panel').classList.add('modo-escucha');
            document.getElementById('status-voz').innerHTML = '<span class="blink">● HABLA AHORA ●</span>';
        };

        recognition.onresult = (e) => {
            if (!escuchaActivada) return;
            const res = e.results[0][0].transcript;
            document.getElementById('user-answer').value = res;
            escuchaActivada = false;
            setTimeout(verificar, 400);
        };

        recognition.onend = () => {
            document.getElementById('central-panel').classList.remove('modo-escucha');
            if (activo && !hablando && !escuchaActivada) {
                setTimeout(() => { if(activo && !hablando) try { recognition.start(); } catch(e){} }, 800);
            }
        };

        function hablar(texto, letra) {
            hablando = true; escuchaActivada = false; recognition.stop();
            const frase = `${FONETICA_LETRAS[letra] || 'con la ' + letra}: ${texto}`;
            const utterance = new SpeechSynthesisUtterance(frase);
            utterance.lang = 'es-ES';
            utterance.onend = () => {
                setTimeout(() => {
                    hablando = false;
                    document.getElementById('texto-pregunta').innerText = `${letra}: ${texto}`;
                    if(activo) try { recognition.start(); } catch(e){}
                }, 800);
            };
            window.speechSynthesis.speak(utterance);
        }

        function verificar() {
            hablando = true;
            const resUser = súperNormalizar(document.getElementById('user-answer').value);
            const actual = preguntasActuales[currentIndex];
            const letraNorm = actual.letra.toLowerCase();

            if (resUser.includes("pasapalabra")) {
                document.getElementById('user-answer').value = ""; pasapalabra(); return;
            }

            const esValido = actual.r.some(n => {
                const nNorm = súperNormalizar(n);
                let okIni = resUser.startsWith(letraNorm);
                if (letraNorm === 'q') okIni = (resUser.startsWith('q') || resUser.startsWith('c'));
                if (letraNorm === 'y') okIni = (resUser.startsWith('y') || resUser.startsWith('i') || resUser.startsWith('ll'));
                if (letraNorm === 'x') okIni = (resUser.includes('x') || resUser.includes('s'));
                if (letraNorm === 'b' || letraNorm === 'v') okIni = (resUser.startsWith('b') || resUser.startsWith('v'));
                return okIni && (resUser.includes(nNorm) || nNorm.includes(resUser));
            });

            if (esValido) {
                actual.estado = 'acierto';
                document.getElementById(`letra-${currentIndex}`).classList.add('acertada');
                document.getElementById('user-answer').value = ""; hablando = false; siguiente();
            } else {
                actual.estado = 'fallo';
                document.getElementById(`letra-${currentIndex}`).classList.add('fallada');
                const fb = new SpeechSynthesisUtterance(`Error, la respuesta era ${actual.r[0]}`);
                fb.lang = 'es-ES'; fb.onend = () => { document.getElementById('user-answer').value = ""; hablando = false; siguiente(); };
                window.speechSynthesis.speak(fb);
            }
        }

        function siguiente() {
            let v = 0;
            while (preguntasActuales[currentIndex].estado && v < 25) { currentIndex = (currentIndex + 1) % 25; v++; }
            if (v === 25) { finalizar(); return; }
            document.querySelectorAll('.letra').forEach(l => l.classList.remove('activa'));
            document.getElementById(`letra-${currentIndex}`).classList.add('activa');
            hablar(preguntasActuales[currentIndex].p, preguntasActuales[currentIndex].letra);
        }

        function pasapalabra() {
            hablando = true;
            const v = new SpeechSynthesisUtterance("Pasamos palabra");
            v.onend = () => { currentIndex = (currentIndex + 1) % 25; hablando = false; siguiente(); };
            window.speechSynthesis.speak(v);
        }

        function finalizar() {
            activo = false; clearInterval(timer); recognition.stop();
            const ok = preguntasActuales.filter(p => p.estado === 'acierto').length;
            if (ok === 25) {
                document.getElementById('texto-pregunta').innerText = "¡HISTÓRICO! ¡ROSCO COMPLETADO!";
                document.getElementById('central-panel').classList.add('celebracion');
                sonarExito();
            } else {
                document.getElementById('texto-pregunta').innerText = `PARTIDO FINALIZADO. Aciertos: ${ok}`;
            }
            document.getElementById('input-area').classList.add('hidden');
            document.getElementById('btn-start').classList.remove('hidden');
        }

        document.getElementById('btn-start').addEventListener('click', () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('central-panel').classList.remove('celebracion');
            
            // Generar partida aleatoria de 25 preguntas
            preguntasActuales = Object.keys(bancoCompleto).sort().map(letra => {
                const opciones = bancoCompleto[letra];
                const eleccion = opciones[Math.floor(Math.random() * opciones.length)];
                return { letra: letra, ...eleccion, estado: null };
            });

            const rosco = document.getElementById('rosco-letras'); rosco.innerHTML = "";
            preguntasActuales.forEach((p, i) => {
                const li = document.createElement('li'); li.className = 'letra'; li.innerText = p.letra; li.id = `letra-${i}`;
                const angle = (i * (360 / 25)) - 90;
                li.style.left = `${250 + 220 * Math.cos(angle * Math.PI / 180)}px`;
                li.style.top = `${250 + 220 * Math.sin(angle * Math.PI / 180)}px`;
                rosco.appendChild(li);
            });

            document.getElementById('btn-start').classList.add('hidden');
            document.getElementById('input-area').classList.remove('hidden');
            activo = true; tiempo = 120; currentIndex = 0;
            timer = setInterval(() => { if(!hablando) { tiempo--; document.getElementById('timer').innerText = tiempo; if(tiempo<=0) finalizar(); }}, 1000);
            siguiente();
        });

        document.getElementById('btn-enviar').addEventListener('click', verificar);
        document.getElementById('btn-pasapalabra').addEventListener('click', pasapalabra);
        document.getElementById('btn-micro').addEventListener('click', () => { if(!hablando) try { recognition.start(); } catch(e){} });
    </script>
</body>
</html>
